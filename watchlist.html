<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX Watchlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #121215;
    --bg-surface: #1a1a22;
    --bg-raised: #22222b;
    --bg-inset: #161619;
    --bg-hover: rgba(255, 200, 100, 0.04);

    --border-subtle: rgba(255, 200, 100, 0.06);
    --border-medium: rgba(255, 200, 100, 0.12);
    --border-strong: rgba(255, 200, 100, 0.20);

    --accent: #f59e0b;
    --accent-light: #fbbf24;
    --accent-dim: rgba(245, 158, 11, 0.12);
    --accent-gradient: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
    --accent-subtle: rgba(245, 158, 11, 0.08);
    --accent-glow: rgba(245, 158, 11, 0.30);

    --green: #34d399;
    --green-dim: rgba(52, 211, 153, 0.10);
    --green-border: rgba(52, 211, 153, 0.25);
    --red: #f87171;
    --red-dim: rgba(248, 113, 113, 0.10);
    --red-border: rgba(248, 113, 113, 0.30);
    --yellow: #fbbf24;
    --blue: #60a5fa;

    --text-primary: #f5f5f0;
    --text-secondary: #a8a8a0;
    --text-muted: #78786e;
    --text-faint: #7a7a72;

    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;

    --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);

    --transition-fast: 0.15s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-base);
    background-image: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(245,158,11,0.04) 0%, transparent 70%);
    min-height: 100vh;
    color: var(--text-secondary);
    -webkit-font-smoothing: antialiased;
    padding: 28px 32px;
    line-height: 1.5;
  }

  /* Header */
  .header {
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px; margin-bottom: 28px;
    padding-bottom: 20px; border-bottom: 1px solid var(--border-subtle);
  }
  .header-branding { display: flex; flex-direction: column; }
  .header-subtitle {
    font-size: 10px; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 2.5px; margin-bottom: 4px;
  }
  h1 {
    font-size: 28px; font-weight: 800;
    background: var(--accent-gradient);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-title-row {
    display: flex; align-items: baseline; gap: 16px;
  }
  .header-link {
    font-size: 12px; color: var(--text-muted);
    text-decoration: none; letter-spacing: 0.5px;
    transition: color var(--transition-fast);
  }
  .header-link:hover { color: var(--accent-light); }
  .header-link.active { color: var(--accent); font-weight: 600; }
  .header-right {
    display: flex; align-items: center; gap: 16px;
  }
  .refresh-info {
    font-size: 11px; color: var(--text-faint);
  }
  .refresh-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); margin-right: 6px; vertical-align: middle;
  }
  .refresh-dot.paused { background: var(--text-faint); }

  /* Summary cards */
  .summary-row {
    display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .summary-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 16px 20px; flex: 1; min-width: 160px;
  }
  .summary-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--text-faint); margin-bottom: 4px;
  }
  .summary-value {
    font-size: 22px; font-weight: 700; color: var(--text-primary);
  }
  .summary-sub {
    font-size: 12px; margin-top: 2px;
  }

  /* Add symbol form */
  .add-form {
    display: flex; gap: 8px; margin-bottom: 24px;
  }
  .add-input {
    background: var(--bg-raised);
    border: 1px solid var(--border-medium);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-family: inherit; font-size: 13px; font-weight: 500;
    padding: 8px 12px; width: 200px;
    outline: none;
    transition: border-color var(--transition-fast);
  }
  .add-input::placeholder { color: var(--text-faint); }
  .add-input:focus { border-color: var(--accent); }
  .add-btn {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: var(--radius-sm);
    color: var(--accent);
    font-family: inherit; font-size: 13px; font-weight: 600;
    padding: 8px 16px;
    cursor: pointer;
    transition: all var(--transition-fast);
  }
  .add-btn:hover { background: rgba(245, 158, 11, 0.20); }
  .add-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .add-error {
    font-size: 12px; color: var(--red); align-self: center;
  }

  /* Table */
  .table-wrap {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    overflow-x: auto;
  }
  table {
    width: 100%; border-collapse: collapse;
    font-size: 13px;
  }
  th {
    text-align: left; padding: 10px 12px;
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-faint); border-bottom: 1px solid var(--border-medium);
    white-space: nowrap; cursor: pointer; user-select: none;
  }
  th:hover { color: var(--accent-light); }
  th:last-child { cursor: default; }
  th:last-child:hover { color: var(--text-faint); }
  th .sort-arrow { font-size: 9px; margin-left: 3px; opacity: 0.5; }
  th .sort-arrow.active { opacity: 1; color: var(--accent); }
  td {
    padding: 8px 12px; border-bottom: 1px solid var(--border-subtle);
    white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover { background: var(--bg-hover); }

  /* Positive/negative colors */
  .positive { color: var(--green); }
  .negative { color: var(--red); }

  /* Remove button */
  .remove-btn {
    background: none; border: none; color: var(--text-faint);
    font-size: 15px; cursor: pointer; padding: 2px 6px;
    border-radius: 4px; transition: all var(--transition-fast);
    line-height: 1;
  }
  .remove-btn:hover { color: var(--red); background: var(--red-dim); }

  /* Landing / loading state */
  .landing {
    text-align: center; padding: 80px 20px;
    color: var(--text-muted);
  }
  .landing .icon { font-size: 48px; margin-bottom: 16px; }
  .spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 2px solid var(--border-medium);
    border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Pulse animation for live updates */
  @keyframes flash-update {
    0% { background: rgba(245, 158, 11, 0.15); }
    100% { background: transparent; }
  }
  .flash td { animation: flash-update 0.6s ease-out; }
</style>
</head>
<body>

<div class="header">
  <div class="header-branding">
    <div class="header-subtitle">Powered by ARC Investments</div>
    <div class="header-title-row">
      <h1>APEX</h1>
      <a href="/" class="header-link">Dashboard</a>
      <a href="/monitor" class="header-link">Monitor</a>
      <a href="/watchlist" class="header-link active">Watchlist</a>
      <a href="/admin" class="header-link">Admin</a>
    </div>
  </div>
  <div class="header-right">
    <span class="refresh-info" id="refreshInfo">
      <span class="refresh-dot" id="refreshDot"></span>
      <span id="refreshText">Loading...</span>
    </span>
  </div>
</div>

<div class="add-form">
  <input type="text" class="add-input" id="symbolInput" placeholder="Enter symbol..." autocomplete="off" spellcheck="false">
  <button class="add-btn" id="addBtn">Add</button>
  <span class="add-error" id="addError"></span>
</div>

<div class="summary-row">
  <div class="summary-card">
    <div class="summary-label">Watching</div>
    <div class="summary-value" id="watchCount">--</div>
  </div>
  <div class="summary-card">
    <div class="summary-label">Winners</div>
    <div class="summary-value positive" id="winCount">--</div>
  </div>
  <div class="summary-card">
    <div class="summary-label">Losers</div>
    <div class="summary-value negative" id="loseCount">--</div>
  </div>
</div>

<div id="content">
  <div class="landing" id="landing">
    <div class="icon">&#128269;</div>
    <p><span class="spinner"></span> Loading watchlist...</p>
  </div>
</div>

<script>
(function() {
  'use strict';

  let portfolio = null;
  let apiKey = '';
  let stockNames = {};
  let refreshTimer = null;
  let lastPrices = {};
  let sortCol = 'dayChange';
  let sortAsc = false;
  let watchlistData = [];
  let historicalData = {};

  // ── Escape HTML ─────────────────────────────────────
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ── Format price (4 decimals for sub-$1, else 2) ───
  function fmtPrice(p) {
    return p < 1 ? p.toFixed(4) : p.toFixed(2);
  }

  // ── Market hours check ──────────────────────────────
  function isMarketOpen() {
    const now = new Date();
    const et = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
    const day = et.getDay();
    if (day === 0 || day === 6) return false;
    const mins = et.getHours() * 60 + et.getMinutes();
    return mins >= 570 && mins < 960;
  }

  // ── Load portfolio from server ──────────────────────
  async function loadPortfolio() {
    try {
      const res = await fetch('/api/portfolio');
      if (!res.ok) throw new Error('Server ' + res.status);
      portfolio = await res.json();
    } catch (e) {
      try {
        const stored = localStorage.getItem('aiTradingPortfolio');
        if (stored) portfolio = JSON.parse(stored);
      } catch (_) {}
    }
    if (!portfolio) {
      document.getElementById('landing').innerHTML =
        '<div class="icon">&#9888;&#65039;</div><p>Could not load portfolio. Open the main dashboard first.</p>';
      return;
    }
    migrateWatchlist();
  }

  // ── Migrate legacy string-array watchlist ───────────
  function migrateWatchlist() {
    if (!portfolio.watchlist) { portfolio.watchlist = []; return; }
    let migrated = false;
    portfolio.watchlist = portfolio.watchlist.map(entry => {
      if (typeof entry === 'string') {
        migrated = true;
        return { symbol: entry, addedAt: null, addedPrice: null };
      }
      return entry;
    });
    if (migrated) savePortfolio();
  }

  // ── Load stock names ────────────────────────────────
  async function loadStockNames() {
    try {
      const res = await fetch('/api/stocks');
      if (res.ok) {
        const data = await res.json();
        if (data.stockNames) stockNames = data.stockNames;
      }
    } catch (_) {}
  }

  // ── Load API key ────────────────────────────────────
  async function loadApiKey() {
    try {
      const res = await fetch('/api/config');
      if (res.ok) {
        const cfg = await res.json();
        if (cfg.polygonApiKey) { apiKey = cfg.polygonApiKey; return; }
      }
    } catch (_) {}
    apiKey = localStorage.getItem('polygon_api_key') || '';
  }

  // ── Save portfolio to server ────────────────────────
  async function savePortfolio() {
    try {
      await fetch('/api/portfolio', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(portfolio)
      });
    } catch (_) {}
    // Also save to localStorage as fallback
    try {
      localStorage.setItem('aiTradingPortfolio', JSON.stringify(portfolio));
    } catch (_) {}
  }

  // ── Fetch bulk snapshot ─────────────────────────────
  async function fetchPrices(symbols) {
    if (!apiKey || symbols.length === 0) return {};
    const tickerParam = symbols.join(',');
    const res = await fetch(
      `https://api.polygon.io/v2/snapshot/locale/us/markets/stocks/tickers?tickers=${tickerParam}&apiKey=${apiKey}`
    );
    const data = await res.json();
    if (!data || data.status !== 'OK' || !data.tickers) return {};

    const marketOpen = isMarketOpen();
    const result = {};
    for (const ticker of data.tickers) {
      const sym = ticker.ticker;
      const day = ticker.day;
      const prevDay = ticker.prevDay;
      if (!day || !prevDay) continue;

      let price;
      if (marketOpen) {
        price = (ticker.lastTrade && ticker.lastTrade.p) || day.c || day.l;
      } else {
        price = day.c || (ticker.lastTrade && ticker.lastTrade.p) || day.l;
      }
      const prevClose = prevDay.c;
      if (!price || price === 0) price = prevClose;
      if (!price || !prevClose) continue;

      let change, changePct;
      if (marketOpen && ticker.todaysChange != null) {
        change = ticker.todaysChange;
        changePct = ticker.todaysChangePerc;
      } else {
        change = price - prevClose;
        changePct = (price - prevClose) / prevClose * 100;
      }

      result[sym] = {
        price: parseFloat(price),
        change: parseFloat(change),
        changePct: parseFloat(changePct),
        prevClose: parseFloat(prevClose)
      };
    }
    return result;
  }

  // ── Fetch historical daily bars ──────────────────
  async function fetchHistoricalBars(symbols) {
    if (!apiKey || symbols.length === 0) return;

    const to = new Date();
    const from = new Date();
    from.setDate(from.getDate() - 25);
    const fromStr = from.toISOString().split('T')[0];
    const toStr = to.toISOString().split('T')[0];

    await Promise.all(symbols.map(async (symbol) => {
      if (historicalData[symbol]) return;
      try {
        const res = await fetch(
          `https://api.polygon.io/v2/aggs/ticker/${symbol}/range/1/day/${fromStr}/${toStr}?adjusted=true&sort=asc&limit=14&apiKey=${apiKey}`
        );
        const data = await res.json();
        if (data.status === 'OK' && data.results) {
          historicalData[symbol] = data.results;
        }
      } catch (e) {
        console.error('Historical bars failed for', symbol, e);
      }
    }));
  }

  // ── Add symbol ──────────────────────────────────────
  const symbolInput = document.getElementById('symbolInput');
  const addBtn = document.getElementById('addBtn');
  const addError = document.getElementById('addError');

  async function addSymbol() {
    const raw = symbolInput.value.trim().toUpperCase();
    addError.textContent = '';
    if (!raw) return;

    // Check duplicate
    if (portfolio.watchlist.some(e => e.symbol === raw)) {
      addError.textContent = raw + ' is already on your watchlist';
      return;
    }

    addBtn.disabled = true;
    addBtn.textContent = '...';

    try {
      const prices = await fetchPrices([raw]);
      if (!prices[raw]) {
        addError.textContent = 'Could not find price for ' + raw;
        return;
      }

      portfolio.watchlist.push({
        symbol: raw,
        addedAt: new Date().toISOString(),
        addedPrice: prices[raw].price
      });

      await savePortfolio();
      symbolInput.value = '';
      await fetchHistoricalBars([raw]);
      await refresh();
    } catch (e) {
      addError.textContent = 'Error adding symbol';
    } finally {
      addBtn.disabled = false;
      addBtn.textContent = 'Add';
    }
  }

  addBtn.addEventListener('click', addSymbol);
  symbolInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addSymbol();
  });

  // ── Remove symbol ───────────────────────────────────
  async function removeSymbol(symbol) {
    portfolio.watchlist = portfolio.watchlist.filter(e => e.symbol !== symbol);
    await savePortfolio();
    await refresh();
  }

  // ── Compute watchlist rows ──────────────────────────
  function computeRows(prices) {
    const rows = [];
    for (const entry of (portfolio.watchlist || [])) {
      const snap = prices[entry.symbol];
      if (!snap) continue;

      let returnPct = null;
      if (entry.addedPrice != null && entry.addedPrice > 0) {
        returnPct = ((snap.price - entry.addedPrice) / entry.addedPrice) * 100;
      }

      let avg5d = null, avg10d = null;
      const bars = historicalData[entry.symbol];
      if (bars && bars.length >= 2) {
        const changes = [];
        for (let i = 1; i < bars.length; i++) {
          changes.push(((bars[i].c - bars[i-1].c) / bars[i-1].c) * 100);
        }
        if (changes.length >= 5) {
          const last5 = changes.slice(-5);
          avg5d = last5.reduce((s, v) => s + v, 0) / last5.length;
        }
        if (changes.length >= 10) {
          const last10 = changes.slice(-10);
          avg10d = last10.reduce((s, v) => s + v, 0) / last10.length;
        }
      }

      rows.push({
        symbol: entry.symbol,
        name: stockNames[entry.symbol] || '',
        price: snap.price,
        dayChange: snap.changePct,
        returnPct,
        avg5d,
        avg10d,
        addedAt: entry.addedAt,
        addedPrice: entry.addedPrice
      });
    }
    return rows;
  }

  // ── Sort rows ───────────────────────────────────────
  function sortRows(rows) {
    const copy = [...rows];
    copy.sort((a, b) => {
      let cmp = 0;
      switch (sortCol) {
        case 'symbol': cmp = a.symbol.localeCompare(b.symbol); break;
        case 'name': cmp = (a.name || '').localeCompare(b.name || ''); break;
        case 'price': cmp = a.price - b.price; break;
        case 'dayChange': cmp = a.dayChange - b.dayChange; break;
        case 'returnPct': cmp = (a.returnPct ?? -9999) - (b.returnPct ?? -9999); break;
        case 'avg5d': cmp = (a.avg5d ?? -9999) - (b.avg5d ?? -9999); break;
        case 'avg10d': cmp = (a.avg10d ?? -9999) - (b.avg10d ?? -9999); break;
        case 'addedAt': cmp = (a.addedAt || '').localeCompare(b.addedAt || ''); break;
        default: cmp = a.dayChange - b.dayChange; break;
      }
      return sortAsc ? cmp : -cmp;
    });
    return copy;
  }

  // ── Render ──────────────────────────────────────────
  function render(rows) {
    watchlistData = rows;
    const sorted = sortRows(rows);

    // Summary
    const withReturn = rows.filter(r => r.returnPct != null);
    const winners = withReturn.filter(r => r.returnPct > 0).length;
    const losers = withReturn.filter(r => r.returnPct < 0).length;

    document.getElementById('watchCount').textContent = rows.length;
    document.getElementById('winCount').textContent = winners;
    document.getElementById('loseCount').textContent = losers;

    if (rows.length === 0) {
      document.getElementById('content').innerHTML =
        '<div class="landing"><div class="icon">&#128269;</div><p>Your watchlist is empty. Add a symbol above to start tracking.</p></div>';
      return;
    }

    // Table
    const cols = [
      { key: 'symbol', label: 'Symbol' },
      { key: 'price', label: 'Price' },
      { key: 'dayChange', label: 'Day%' },
      { key: 'avg5d', label: '5D Avg%' },
      { key: 'avg10d', label: '10D Avg%' },
      { key: 'returnPct', label: 'Since Added' },
      { key: 'addedAt', label: 'Added' },
    ];

    let html = '<div class="table-wrap"><table>';
    html += '<thead><tr>';
    for (const col of cols) {
      const arrow = sortCol === col.key
        ? `<span class="sort-arrow active">${sortAsc ? '\u25B2' : '\u25BC'}</span>`
        : '<span class="sort-arrow">\u25B2</span>';
      html += `<th data-col="${col.key}">${col.label} ${arrow}</th>`;
    }
    html += '<th></th>'; // Remove column
    html += '</tr></thead><tbody>';

    for (const r of sorted) {
      const priceChanged = lastPrices[r.symbol] != null && lastPrices[r.symbol] !== r.price;
      const flashClass = priceChanged ? ' flash' : '';

      const returnDisplay = r.returnPct != null
        ? `<span class="${r.returnPct >= 0 ? 'positive' : 'negative'}">${r.returnPct >= 0 ? '+' : ''}${r.returnPct.toFixed(2)}%</span>`
        : '\u2014';

      const addedDisplay = r.addedAt
        ? new Date(r.addedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
        : '\u2014';

      html += `<tr class="${flashClass}">`;
      html += `<td style="font-weight:600"${r.name ? ` title="${esc(r.name)}"` : ''}>${esc(r.symbol)}</td>`;
      html += `<td>$${fmtPrice(r.price)}</td>`;
      html += `<td class="${r.dayChange >= 0 ? 'positive' : 'negative'}">${r.dayChange >= 0 ? '+' : ''}${r.dayChange.toFixed(2)}%</td>`;
      const avg5dHtml = r.avg5d != null
        ? `<span class="${r.avg5d >= 0 ? 'positive' : 'negative'}">${r.avg5d >= 0 ? '+' : ''}${r.avg5d.toFixed(2)}%</span>`
        : '\u2014';
      const avg10dHtml = r.avg10d != null
        ? `<span class="${r.avg10d >= 0 ? 'positive' : 'negative'}">${r.avg10d >= 0 ? '+' : ''}${r.avg10d.toFixed(2)}%</span>`
        : '\u2014';
      html += `<td>${avg5dHtml}</td>`;
      html += `<td>${avg10dHtml}</td>`;
      html += `<td>${returnDisplay}</td>`;
      html += `<td style="color:var(--text-muted)">${addedDisplay}</td>`;
      html += `<td><button class="remove-btn" data-symbol="${esc(r.symbol)}" title="Remove ${esc(r.symbol)}">&times;</button></td>`;
      html += '</tr>';
    }

    html += '</tbody></table></div>';
    document.getElementById('content').innerHTML = html;

    // Save prices for flash detection
    rows.forEach(r => { lastPrices[r.symbol] = r.price; });

    // Sort handlers
    document.querySelectorAll('th[data-col]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (sortCol === col) { sortAsc = !sortAsc; }
        else { sortCol = col; sortAsc = true; }
        render(watchlistData);
      });
    });

    // Remove handlers
    document.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', () => removeSymbol(btn.dataset.symbol));
    });
  }

  // ── Refresh cycle ───────────────────────────────────
  async function refresh() {
    if (!portfolio || !apiKey) return;

    const symbols = (portfolio.watchlist || []).map(e => e.symbol);
    if (symbols.length === 0) {
      render([]);
      return;
    }

    try {
      const prices = await fetchPrices(symbols);
      if (Object.keys(prices).length === 0) return;
      const rows = computeRows(prices);
      render(rows);
    } catch (e) {
      console.error('Refresh failed:', e);
    }

    updateRefreshStatus();
  }

  // ── Refresh status indicator ────────────────────────
  function updateRefreshStatus() {
    const dot = document.getElementById('refreshDot');
    const text = document.getElementById('refreshText');
    const open = isMarketOpen();

    if (open) {
      dot.className = 'refresh-dot';
      text.textContent = 'Live \u2022 30s refresh';
    } else {
      dot.className = 'refresh-dot paused';
      text.textContent = 'Market closed';
    }
  }

  // ── Auto-refresh manager ────────────────────────────
  function scheduleRefresh() {
    if (refreshTimer) clearInterval(refreshTimer);

    if (isMarketOpen()) {
      refreshTimer = setInterval(refresh, 30000);
    }

    setInterval(() => {
      const open = isMarketOpen();
      if (open && !refreshTimer) {
        refresh();
        refreshTimer = setInterval(refresh, 30000);
      } else if (!open && refreshTimer) {
        clearInterval(refreshTimer);
        refreshTimer = null;
        updateRefreshStatus();
      }
    }, 60000);
  }

  // ── Pause when tab is hidden ────────────────────────
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
    } else {
      refresh();
      if (isMarketOpen()) {
        refreshTimer = setInterval(refresh, 30000);
      }
    }
  });

  // ── Init ────────────────────────────────────────────
  async function init() {
    await Promise.all([loadPortfolio(), loadApiKey(), loadStockNames()]);

    if (!portfolio) return;
    if (!apiKey) {
      document.getElementById('landing').innerHTML =
        '<div class="icon">&#128273;</div><p>No API key found. Open the main dashboard first to configure your Massive API key.</p>';
      return;
    }

    const symbols = (portfolio.watchlist || []).map(e => e.symbol);
    await fetchHistoricalBars(symbols);

    await refresh();
    updateRefreshStatus();
    scheduleRefresh();
  }

  init();
})();
</script>
</body>
</html>
