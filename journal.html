<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX Trade Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #121215;
    --bg-surface: #1a1a22;
    --bg-raised: #22222b;
    --bg-inset: #161619;
    --bg-hover: rgba(255, 200, 100, 0.04);

    --border-subtle: rgba(255, 200, 100, 0.06);
    --border-medium: rgba(255, 200, 100, 0.12);
    --border-strong: rgba(255, 200, 100, 0.20);

    --accent: #f59e0b;
    --accent-light: #fbbf24;
    --accent-dim: rgba(245, 158, 11, 0.12);
    --accent-gradient: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
    --accent-subtle: rgba(245, 158, 11, 0.08);
    --accent-glow: rgba(245, 158, 11, 0.30);

    --green: #34d399;
    --green-dim: rgba(52, 211, 153, 0.10);
    --green-border: rgba(52, 211, 153, 0.25);
    --red: #f87171;
    --red-dim: rgba(248, 113, 113, 0.10);
    --red-border: rgba(248, 113, 113, 0.30);
    --yellow: #fbbf24;
    --blue: #60a5fa;

    --text-primary: #f5f5f0;
    --text-secondary: #a8a8a0;
    --text-muted: #78786e;
    --text-faint: #7a7a72;

    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;

    --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);

    --transition-fast: 0.15s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-base);
    background-image: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(245,158,11,0.04) 0%, transparent 70%);
    min-height: 100vh;
    color: var(--text-secondary);
    -webkit-font-smoothing: antialiased;
    padding: 28px 32px;
    line-height: 1.5;
  }

  /* ── Header ─────────────────────────────────────── */
  .header {
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px; margin-bottom: 28px;
    padding-bottom: 20px; border-bottom: 1px solid var(--border-subtle);
  }
  .header-branding { display: flex; flex-direction: column; }
  .header-subtitle {
    font-size: 10px; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 2.5px; margin-bottom: 4px;
  }
  h1 {
    font-size: 28px; font-weight: 800;
    background: var(--accent-gradient);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; letter-spacing: -0.5px;
  }
  .header-tagline { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
  .header-nav { display: flex; gap: 8px; align-items: center; }
  .nav-link {
    display: inline-block; text-decoration: none; text-align: center;
    background: var(--bg-raised); color: var(--text-secondary);
    border: 1px solid var(--border-medium);
    padding: 8px 18px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: all var(--transition-fast);
  }
  .nav-link:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Loading / Landing ──────────────────────────── */
  #landing {
    text-align: center; padding: 80px 20px; color: var(--text-muted);
  }
  #landing .icon { font-size: 48px; margin-bottom: 16px; }

  #dashboard { display: none; }

  /* ── Stats Row ──────────────────────────────────── */
  .stats-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 10px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--bg-inset); border-radius: var(--radius-sm);
    padding: 12px 14px; border: 1px solid var(--border-subtle);
  }
  .stat-label {
    font-size: 11px; color: var(--text-muted); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.8px;
  }
  .stat-value { font-size: 22px; font-weight: 700; margin-top: 2px; color: var(--text-primary); }
  .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .positive { color: var(--green); }
  .negative { color: var(--red); }

  /* ── Cards ──────────────────────────────────────── */
  .card {
    background: var(--bg-surface); border-radius: var(--radius-lg);
    padding: 28px; border: 1px solid var(--border-subtle);
    box-shadow: var(--shadow-sm); margin-bottom: 20px;
    transition: box-shadow var(--transition-fast), border-color var(--transition-fast);
  }
  .card:hover { box-shadow: var(--shadow-md); }

  .chart-title {
    font-size: 16px; font-weight: 600; color: var(--text-primary);
    margin-bottom: 16px; display: flex; align-items: center;
    gap: 10px; letter-spacing: 0.2px;
  }
  .chart-title::before {
    content: ''; width: 3px; height: 14px;
    background: var(--accent-gradient); border-radius: 2px;
    flex-shrink: 0; box-shadow: 0 0 6px var(--accent-glow);
  }

  /* ── Filters ────────────────────────────────────── */
  .filters-bar {
    display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;
    align-items: center;
  }
  .filter-input {
    background: var(--bg-inset); color: var(--text-primary);
    border: 1px solid var(--border-medium); border-radius: var(--radius-sm);
    padding: 7px 12px; font-size: 13px; font-family: inherit;
    outline: none; transition: border-color var(--transition-fast);
  }
  .filter-input:focus { border-color: var(--accent); }
  .filter-input::placeholder { color: var(--text-faint); }
  .filter-select {
    background: var(--bg-inset); color: var(--text-primary);
    border: 1px solid var(--border-medium); border-radius: var(--radius-sm);
    padding: 7px 12px; font-size: 13px; font-family: inherit;
    cursor: pointer; outline: none;
  }
  .filter-select option { background: var(--bg-raised); color: var(--text-primary); }
  .filter-btn {
    background: var(--bg-raised); color: var(--text-secondary);
    border: 1px solid var(--border-medium); border-radius: var(--radius-sm);
    padding: 7px 14px; font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: all var(--transition-fast);
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
  .filter-count { font-size: 12px; color: var(--text-faint); margin-left: auto; }

  /* ── Journal Entry ──────────────────────────────── */
  .journal-entry {
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color var(--transition-fast);
  }
  .journal-entry:hover { border-color: var(--border-medium); }
  .journal-entry.expanded { border-color: var(--border-strong); }

  .journal-header {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; cursor: pointer;
    background: var(--bg-inset);
    transition: background var(--transition-fast);
    flex-wrap: wrap;
  }
  .journal-header:hover { background: var(--bg-hover); }

  .journal-symbol {
    font-weight: 700; font-size: 14px; color: var(--text-primary);
    min-width: 55px;
  }
  .journal-dates {
    font-size: 11px; color: var(--text-muted); min-width: 160px;
  }
  .journal-return {
    font-size: 12px; font-weight: 700;
    padding: 3px 10px; border-radius: 12px;
    min-width: 60px; text-align: center;
  }
  .journal-return.win {
    background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border);
  }
  .journal-return.loss {
    background: var(--red-dim); color: var(--red); border: 1px solid var(--red-border);
  }
  .journal-hold {
    font-size: 11px; color: var(--text-faint); min-width: 60px;
  }
  .journal-exit-reason {
    font-size: 10px; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.5px; font-weight: 600;
    padding: 2px 8px; border-radius: 4px;
    background: rgba(255,255,255,0.04);
  }
  .journal-sector {
    font-size: 10px; color: var(--text-faint); margin-left: auto;
  }
  .journal-toggle {
    color: var(--text-faint); font-size: 10px;
    transition: transform var(--transition-fast);
  }
  .journal-toggle.open { transform: rotate(180deg); }

  .journal-body {
    display: none; padding: 16px 20px;
    background: var(--bg-surface);
    border-top: 1px solid var(--border-subtle);
  }
  .journal-entry.expanded .journal-body { display: block; }

  .journal-section-title {
    font-size: 11px; font-weight: 700; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 8px; margin-top: 16px;
  }
  .journal-section-title:first-child { margin-top: 0; }

  .signal-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 6px; margin-bottom: 12px;
  }
  .signal-item {
    background: var(--bg-inset); border-radius: 6px;
    padding: 6px 10px; border: 1px solid var(--border-subtle);
  }
  .signal-label {
    font-size: 9px; color: var(--text-faint); text-transform: uppercase;
    letter-spacing: 0.5px; font-weight: 600;
  }
  .signal-value {
    font-size: 13px; font-weight: 600; color: var(--text-primary); margin-top: 1px;
  }

  .journal-reasoning {
    font-size: 12px; color: var(--text-secondary); line-height: 1.6;
    padding: 10px 14px; background: var(--bg-inset);
    border-radius: var(--radius-sm); border: 1px solid var(--border-subtle);
    margin-bottom: 8px;
  }

  .outcome-row {
    display: flex; flex-wrap: wrap; gap: 16px; margin-top: 12px;
    padding: 12px 14px; background: var(--bg-inset);
    border-radius: var(--radius-sm); border: 1px solid var(--border-subtle);
  }
  .outcome-item {
    display: flex; flex-direction: column;
  }
  .outcome-label {
    font-size: 9px; color: var(--text-faint); text-transform: uppercase;
    letter-spacing: 0.5px; font-weight: 600;
  }
  .outcome-value {
    font-size: 14px; font-weight: 700; color: var(--text-primary); margin-top: 1px;
  }

  /* ── Open Positions ─────────────────────────────── */
  .open-position {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm); margin-bottom: 6px;
    background: var(--bg-inset);
  }
  .open-symbol { font-weight: 700; font-size: 14px; color: var(--text-primary); min-width: 55px; }
  .open-detail { font-size: 11px; color: var(--text-muted); }

  /* ── Empty state ────────────────────────────────── */
  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--text-faint); font-size: 13px;
  }

  /* ── Transaction Log ──────────────────────────────── */
  .tx-log-table {
    width: 100%; border-collapse: collapse; font-size: 12px;
  }
  .tx-log-table th {
    text-align: left; padding: 8px 10px; font-size: 10px;
    color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.5px;
    font-weight: 600; border-bottom: 1px solid var(--border-medium);
    white-space: nowrap;
  }
  .tx-log-table td {
    padding: 7px 10px; border-bottom: 1px solid var(--border-subtle);
    white-space: nowrap;
  }
  .tx-log-table tr.tx-buy { background: var(--green-dim); }
  .tx-log-table tr.tx-sell { background: var(--red-dim); }
  .tx-log-table tr:hover { background: var(--bg-hover); }
  .tx-type-buy { color: var(--green); font-weight: 700; }
  .tx-type-sell { color: var(--red); font-weight: 700; }
  .tx-symbol { color: var(--text-primary); font-weight: 600; }
  .tx-reasoning {
    max-width: 250px; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; color: var(--text-muted); cursor: default;
  }
  .tx-log-pagination {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin-top: 14px;
  }
  .tx-log-pagination button {
    background: var(--bg-raised); color: var(--text-secondary);
    border: 1px solid var(--border-medium); border-radius: var(--radius-sm);
    padding: 5px 14px; font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: all var(--transition-fast);
  }
  .tx-log-pagination button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .tx-log-pagination button:disabled { opacity: 0.3; cursor: default; }
  .tx-log-pagination .tx-page-info { font-size: 12px; color: var(--text-muted); }
  .tx-log-collapsed #txLogBody { display: none; }
  .tx-log-collapsed .journal-toggle { transform: rotate(-90deg); }

  /* ── Responsive ─────────────────────────────────── */
  @media (max-width: 700px) {
    body { padding: 16px; }
    .header { flex-direction: column; align-items: flex-start; }
    .signal-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-branding">
    <div class="header-subtitle">Trade Review</div>
    <h1>APEX Journal</h1>
    <div class="header-tagline">End-to-end trade stories with entry &amp; exit signals</div>
  </div>
  <div class="header-nav">
    <a href="/" class="nav-link">Dashboard</a>
    <a href="/analytics" class="nav-link">Analytics</a>
    <a href="/admin" class="nav-link">Admin</a>
  </div>
</div>

<div id="landing">
  <div class="icon">&#128221;</div>
  <p>Connecting to server...</p>
</div>

<div id="dashboard">
  <div class="stats-row" id="statsRow"></div>

  <!-- Open Positions -->
  <div class="card" id="openSection" style="display:none">
    <div class="chart-title">Open Positions</div>
    <div id="openPositions"></div>
  </div>

  <!-- Transaction Log -->
  <div class="card" id="txLogSection" style="display:none">
    <div class="chart-title" onclick="toggleTxLog()" style="cursor:pointer">
      Transaction Log <span class="journal-toggle" id="txLogToggle">&#9662;</span>
    </div>
    <div id="txLogBody">
      <table class="tx-log-table" id="txLogTable"></table>
      <div class="tx-log-pagination" id="txLogPagination"></div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters-bar" id="filtersBar">
    <input type="text" class="filter-input" id="filterSymbol" placeholder="Search symbol..." style="width:130px">
    <button class="filter-btn" id="filterAll" onclick="setOutcomeFilter('all')">All</button>
    <button class="filter-btn" id="filterWins" onclick="setOutcomeFilter('win')">Wins</button>
    <button class="filter-btn" id="filterLosses" onclick="setOutcomeFilter('loss')">Losses</button>
    <select class="filter-select" id="filterSector" onchange="applyFilters()">
      <option value="">All Sectors</option>
    </select>
    <span class="filter-count" id="filterCount"></span>
  </div>

  <!-- Journal Entries -->
  <div id="journalEntries"></div>
</div>

<script>
let data = null;
let outcomeFilter = 'all';
let allEntries = [];
let txLogPage = 1;
const TX_PAGE_SIZE = 40;

function escapeHtml(str) {
  if (typeof str !== 'string') return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function formatHoldTime(ms) {
  if (!ms || ms <= 0) return '—';
  const days = Math.round(ms / (1000 * 60 * 60 * 24));
  if (days === 0) return '<1d';
  if (days === 1) return '1 day';
  return days + ' days';
}

function formatExitReason(reason) {
  if (!reason) return '—';
  return reason.replace(/_/g, ' ');
}

function signalColor(label, value) {
  if (value == null || value === '—') return '';
  const v = typeof value === 'string' ? value.toLowerCase() : value;
  if (label === 'RSI') return v <= 30 ? 'color:var(--green)' : v >= 70 ? 'color:var(--red)' : '';
  if (label === 'MACD') return v === 'bullish' ? 'color:var(--green)' : v === 'bearish' ? 'color:var(--red)' : '';
  if (label === 'Structure') return v === 'bullish' ? 'color:var(--green)' : v === 'bearish' ? 'color:var(--red)' : '';
  if (label === 'Momentum') return v >= 7 ? 'color:var(--green)' : v < 4 ? 'color:var(--red)' : 'color:var(--yellow)';
  if (label === 'RS') return v >= 70 ? 'color:var(--green)' : v < 30 ? 'color:var(--red)' : '';
  if (label === 'Day%' || label === '5D%') return v > 0 ? 'color:var(--green)' : v < 0 ? 'color:var(--red)' : '';
  if (label === 'Sector') {
    if (v === 'accumulate' || v === 'favorable') return 'color:var(--green)';
    if (v === 'avoid' || v === 'caution') return 'color:var(--red)';
  }
  return '';
}

function renderSignalGrid(technicals) {
  if (!technicals || Object.keys(technicals).length === 0) {
    return '<div style="font-size:12px;color:var(--text-faint)">No signal data captured</div>';
  }
  const items = [];
  const add = (label, val, fmt) => {
    if (val == null) return;
    const display = fmt ? fmt(val) : val;
    const color = signalColor(label, val);
    items.push(`<div class="signal-item"><div class="signal-label">${escapeHtml(label)}</div><div class="signal-value" style="${color}">${escapeHtml(String(display))}</div></div>`);
  };
  add('Momentum', technicals.momentumScore);
  add('RS', technicals.rsScore);
  add('RSI', technicals.rsi, v => Math.round(v));
  add('MACD', technicals.macdCrossover);
  add('Structure', technicals.structure);
  add('Day%', technicals.todayChange, v => (v > 0 ? '+' : '') + v.toFixed(1) + '%');
  add('5D%', technicals.totalReturn5d, v => (v > 0 ? '+' : '') + v.toFixed(1) + '%');
  add('Sector', technicals.sectorRotation);
  add('DTC', technicals.daysToCover, v => v.toFixed(1));
  add('VIX', technicals.vixLevel, v => v.toFixed(1));
  add('Score', technicals.compositeScore, v => v.toFixed(1));
  add('MCap', technicals.marketCap, v => {
    if (v >= 1e12) return '$' + (v/1e12).toFixed(1) + 'T';
    if (v >= 1e9) return '$' + (v/1e9).toFixed(1) + 'B';
    if (v >= 1e6) return '$' + (v/1e6).toFixed(0) + 'M';
    return '$' + v;
  });
  add('Vol Ratio', technicals.volumeRatio, v => v.toFixed(2) + 'x');
  add('SMA50', technicals.sma50, v => '$' + v.toFixed(2));
  add('SMA Cross', technicals.smaCrossover);
  if (technicals.choch) add('CHoCH', technicals.chochType || 'yes');
  if (technicals.bos) add('BOS', technicals.bosType || 'yes');
  if (technicals.sweep) add('Sweep', 'yes');
  if (items.length === 0) return '<div style="font-size:12px;color:var(--text-faint)">No signal data</div>';
  return '<div class="signal-grid">' + items.join('') + '</div>';
}

function renderSummaryStats(trades) {
  const el = document.getElementById('statsRow');
  if (!trades || trades.length === 0) {
    el.innerHTML = '';
    return;
  }
  const wins = trades.filter(t => (t.returnPercent || 0) > 0);
  const losses = trades.filter(t => (t.returnPercent || 0) <= 0);
  const winRate = trades.length > 0 ? (wins.length / trades.length * 100).toFixed(0) : '0';
  const avgReturn = trades.length > 0 ? (trades.reduce((s, t) => s + (t.returnPercent || 0), 0) / trades.length).toFixed(1) : '0';
  const avgWin = wins.length > 0 ? (wins.reduce((s, t) => s + t.returnPercent, 0) / wins.length).toFixed(1) : '0';
  const avgLoss = losses.length > 0 ? (losses.reduce((s, t) => s + t.returnPercent, 0) / losses.length).toFixed(1) : '0';
  const avgHold = trades.filter(t => t.holdTime).length > 0
    ? Math.round(trades.filter(t => t.holdTime).reduce((s, t) => s + t.holdTime, 0) / trades.filter(t => t.holdTime).length / 86400000)
    : 0;
  const totalPL = trades.reduce((s, t) => s + (t.profitLoss || 0), 0);
  const grossWins = wins.reduce((s, t) => s + (t.profitLoss || 0), 0);
  const grossLosses = Math.abs(losses.reduce((s, t) => s + (t.profitLoss || 0), 0));
  const profitFactor = grossLosses > 0 ? (grossWins / grossLosses).toFixed(2) : grossWins > 0 ? '999' : '—';

  el.innerHTML = `
    <div class="stat-card"><div class="stat-label">Total Trades</div><div class="stat-value">${trades.length}</div><div class="stat-sub">${wins.length}W / ${losses.length}L</div></div>
    <div class="stat-card"><div class="stat-label">Win Rate</div><div class="stat-value ${+winRate >= 50 ? 'positive' : 'negative'}">${winRate}%</div></div>
    <div class="stat-card"><div class="stat-label">Avg Return</div><div class="stat-value ${+avgReturn >= 0 ? 'positive' : 'negative'}">${avgReturn}%</div><div class="stat-sub">W: +${avgWin}% / L: ${avgLoss}%</div></div>
    <div class="stat-card"><div class="stat-label">Avg Hold</div><div class="stat-value">${avgHold}d</div></div>
    <div class="stat-card"><div class="stat-label">Total P&L</div><div class="stat-value ${totalPL >= 0 ? 'positive' : 'negative'}">$${totalPL.toFixed(0)}</div></div>
    <div class="stat-card"><div class="stat-label">Profit Factor</div><div class="stat-value">${profitFactor}</div></div>
  `;
}

function renderOpenPositions() {
  const section = document.getElementById('openSection');
  const container = document.getElementById('openPositions');
  const theses = data.holdingTheses || {};
  const holdings = data.holdings || {};
  const openSymbols = Object.keys(holdings).filter(s => holdings[s] > 0);
  if (openSymbols.length === 0) {
    section.style.display = 'none';
    return;
  }
  section.style.display = '';
  let html = '';
  for (const sym of openSymbols) {
    const thesis = theses[sym];
    const shares = holdings[sym];
    const entry = thesis?.entryPrice ? '$' + thesis.entryPrice.toFixed(2) : '—';
    const stop = thesis?.stopPrice ? '$' + thesis.stopPrice.toFixed(2) : '—';
    const target = thesis?.targetPrice ? '$' + thesis.targetPrice.toFixed(2) : '—';
    const conviction = thesis?.conviction || '—';
    const date = thesis?.entryDate ? formatDate(thesis.entryDate) : '—';
    html += `<div class="open-position">
      <span class="open-symbol">${escapeHtml(sym)}</span>
      <span class="open-detail">${shares} shares @ ${entry}</span>
      <span class="open-detail">Stop: ${stop}</span>
      <span class="open-detail">Target: ${target}</span>
      <span class="open-detail">Conv: ${escapeHtml(String(conviction))}</span>
      <span class="open-detail">${date}</span>
    </div>`;
  }
  container.innerHTML = html;
}

function populateSectorFilter(trades) {
  const select = document.getElementById('filterSector');
  const sectors = [...new Set(trades.map(t => t.sector).filter(Boolean))].sort();
  // Keep existing value if valid
  const current = select.value;
  select.innerHTML = '<option value="">All Sectors</option>';
  for (const s of sectors) {
    select.innerHTML += `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`;
  }
  if (sectors.includes(current)) select.value = current;
}

function setOutcomeFilter(f) {
  outcomeFilter = f;
  document.getElementById('filterAll').className = 'filter-btn' + (f === 'all' ? ' active' : '');
  document.getElementById('filterWins').className = 'filter-btn' + (f === 'win' ? ' active' : '');
  document.getElementById('filterLosses').className = 'filter-btn' + (f === 'loss' ? ' active' : '');
  applyFilters();
}

function applyFilters() {
  const symbolQ = document.getElementById('filterSymbol').value.trim().toUpperCase();
  const sectorQ = document.getElementById('filterSector').value;
  const filtered = allEntries.filter(t => {
    if (symbolQ && !t.symbol.toUpperCase().includes(symbolQ)) return false;
    if (sectorQ && t.sector !== sectorQ) return false;
    if (outcomeFilter === 'win' && (t.returnPercent || 0) <= 0) return false;
    if (outcomeFilter === 'loss' && (t.returnPercent || 0) > 0) return false;
    return true;
  });
  renderJournalEntries(filtered);
  document.getElementById('filterCount').textContent = filtered.length + ' of ' + allEntries.length + ' trades';
}

function toggleEntry(id) {
  const el = document.getElementById('entry-' + id);
  if (!el) return;
  el.classList.toggle('expanded');
  const icon = el.querySelector('.journal-toggle');
  if (icon) icon.classList.toggle('open');
}

function findEntryReasoning(symbol, buyDate) {
  if (!data.transactions) return null;
  // Find the BUY transaction closest to buyDate for this symbol
  const buys = data.transactions.filter(t => t.type === 'BUY' && t.symbol === symbol);
  if (buys.length === 0) return null;
  // Try exact match first
  const exact = buys.find(t => t.timestamp === buyDate);
  if (exact) return exact.reasoning || exact.reason || null;
  // Try date-only match
  const buyDay = buyDate ? buyDate.substring(0, 10) : null;
  if (buyDay) {
    const dayMatch = buys.find(t => t.timestamp && t.timestamp.substring(0, 10) === buyDay);
    if (dayMatch) return dayMatch.reasoning || dayMatch.reason || null;
  }
  return null;
}

function renderJournalEntries(trades) {
  const container = document.getElementById('journalEntries');
  if (!trades || trades.length === 0) {
    container.innerHTML = '<div class="empty-state">No trades match your filters</div>';
    return;
  }

  let html = '';
  trades.forEach((t, i) => {
    const isWin = (t.returnPercent || 0) > 0;
    const returnStr = (isWin ? '+' : '') + (t.returnPercent || 0).toFixed(1) + '%';
    const plStr = (t.profitLoss >= 0 ? '+$' : '-$') + Math.abs(t.profitLoss || 0).toFixed(0);

    // Find entry reasoning from transactions
    const entryReasoning = findEntryReasoning(t.symbol, t.buyDate);

    html += `<div class="journal-entry" id="entry-${i}">
      <div class="journal-header" onclick="toggleEntry(${i})">
        <span class="journal-symbol">${escapeHtml(t.symbol)}</span>
        <span class="journal-dates">${formatDate(t.buyDate)} &rarr; ${formatDate(t.sellDate)}</span>
        <span class="journal-return ${isWin ? 'win' : 'loss'}">${returnStr}</span>
        <span class="journal-hold">${formatHoldTime(t.holdTime)}</span>
        <span class="journal-exit-reason">${escapeHtml(formatExitReason(t.exitReason))}</span>
        <span class="journal-sector">${escapeHtml(t.sector || '')}</span>
        <span class="journal-toggle">&#9662;</span>
      </div>
      <div class="journal-body">
        <div class="journal-section-title">Entry Signals</div>
        ${renderSignalGrid(t.entryTechnicals)}
        ${entryReasoning ? `<div class="journal-section-title">Entry Reasoning</div><div class="journal-reasoning">${escapeHtml(entryReasoning)}</div>` : ''}
        ${t.entryConviction ? `<div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">Conviction: <strong style="color:var(--text-primary)">${escapeHtml(String(t.entryConviction))}</strong>${t.entryMarketRegime ? ' &middot; Regime: <strong style="color:var(--text-primary)">' + escapeHtml(t.entryMarketRegime) + '</strong>' : ''}</div>` : ''}

        ${t.exitTechnicals && Object.keys(t.exitTechnicals).length > 0 ? `<div class="journal-section-title">Exit Signals</div>${renderSignalGrid(t.exitTechnicals)}` : ''}
        ${t.exitReasoning ? `<div class="journal-section-title">Exit Reasoning</div><div class="journal-reasoning">${escapeHtml(t.exitReasoning)}</div>` : ''}
        ${t.exitMarketRegime ? `<div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">Exit Regime: <strong style="color:var(--text-primary)">${escapeHtml(t.exitMarketRegime)}</strong></div>` : ''}

        <div class="journal-section-title">Outcome</div>
        <div class="outcome-row">
          <div class="outcome-item"><span class="outcome-label">P&L</span><span class="outcome-value ${isWin ? 'positive' : 'negative'}">${plStr}</span></div>
          <div class="outcome-item"><span class="outcome-label">Return</span><span class="outcome-value ${isWin ? 'positive' : 'negative'}">${returnStr}</span></div>
          <div class="outcome-item"><span class="outcome-label">Hold Time</span><span class="outcome-value">${formatHoldTime(t.holdTime)}</span></div>
          <div class="outcome-item"><span class="outcome-label">Shares</span><span class="outcome-value">${t.shares || '—'}</span></div>
          <div class="outcome-item"><span class="outcome-label">Buy Price</span><span class="outcome-value">$${t.buyPrice ? t.buyPrice.toFixed(2) : '—'}</span></div>
          <div class="outcome-item"><span class="outcome-label">Sell Price</span><span class="outcome-value">$${t.sellPrice ? t.sellPrice.toFixed(2) : '—'}</span></div>
          ${t.positionSizePercent != null ? `<div class="outcome-item"><span class="outcome-label">Position Size</span><span class="outcome-value">${t.positionSizePercent.toFixed(1)}%</span></div>` : ''}
        </div>
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

function toggleTxLog() {
  const section = document.getElementById('txLogSection');
  section.classList.toggle('tx-log-collapsed');
}

function txLogSetPage(p) {
  txLogPage = p;
  renderTransactionLog();
}

function renderTransactionLog() {
  const section = document.getElementById('txLogSection');
  const table = document.getElementById('txLogTable');
  const pagination = document.getElementById('txLogPagination');
  const txns = data.transactions || [];
  if (txns.length === 0) {
    section.style.display = 'none';
    return;
  }
  section.style.display = '';

  // Sort most recent first
  const sorted = [...txns].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

  const totalPages = Math.ceil(sorted.length / TX_PAGE_SIZE);
  if (txLogPage > totalPages) txLogPage = totalPages;
  if (txLogPage < 1) txLogPage = 1;
  const start = (txLogPage - 1) * TX_PAGE_SIZE;
  const page = sorted.slice(start, start + TX_PAGE_SIZE);

  let html = '<thead><tr><th>Date</th><th>Type</th><th>Symbol</th><th>Shares</th><th>Price</th><th>Total</th><th>Reasoning</th></tr></thead><tbody>';
  for (const tx of page) {
    const isBuy = tx.type === 'BUY';
    const date = formatDate(tx.timestamp);
    const total = isBuy ? (tx.cost || tx.price * tx.shares) : (tx.revenue || tx.price * tx.shares);
    const reasoning = tx.reasoning || tx.reason || '';
    const truncated = reasoning.length > 50 ? reasoning.substring(0, 50) + '...' : reasoning;
    html += `<tr class="${isBuy ? 'tx-buy' : 'tx-sell'}">
      <td>${date}</td>
      <td class="${isBuy ? 'tx-type-buy' : 'tx-type-sell'}">${tx.type}</td>
      <td class="tx-symbol">${escapeHtml(tx.symbol)}</td>
      <td>${tx.shares}</td>
      <td>$${tx.price.toFixed(2)}</td>
      <td>$${total.toFixed(0)}</td>
      <td class="tx-reasoning" title="${escapeHtml(reasoning)}">${escapeHtml(truncated)}</td>
    </tr>`;
  }
  html += '</tbody>';
  table.innerHTML = html;

  if (totalPages > 1) {
    pagination.innerHTML = `
      <button onclick="txLogSetPage(${txLogPage - 1})"${txLogPage <= 1 ? ' disabled' : ''}>&laquo; Prev</button>
      <span class="tx-page-info">Page ${txLogPage} of ${totalPages} (${sorted.length} transactions)</span>
      <button onclick="txLogSetPage(${txLogPage + 1})"${txLogPage >= totalPages ? ' disabled' : ''}">Next &raquo;</button>`;
  } else {
    pagination.innerHTML = `<span class="tx-page-info">${sorted.length} transaction${sorted.length !== 1 ? 's' : ''}</span>`;
  }
}

function renderAll() {
  const ct = data.closedTrades || [];
  // Sort most recent first
  allEntries = [...ct].sort((a, b) => new Date(b.sellDate) - new Date(a.sellDate));

  renderSummaryStats(allEntries);
  renderOpenPositions();
  renderTransactionLog();
  populateSectorFilter(allEntries);
  setOutcomeFilter('all');
}

// Data loading
function loadData(d, source) {
  data = d;
  document.getElementById('landing').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  renderAll();
}

async function loadFromAPI() {
  try {
    const res = await fetch('/api/portfolio');
    if (!res.ok) throw new Error('Server returned ' + res.status);
    const d = await res.json();
    loadData(d, 'Server');
  } catch (err) {
    document.getElementById('landing').innerHTML =
      '<div class="icon">&#128221;</div><p>Server unavailable. Open the main dashboard first to load portfolio data.</p>';
    console.warn('API load failed:', err.message);

    // Try localStorage fallback
    try {
      const stored = localStorage.getItem('aiTradingPortfolio');
      if (stored) {
        loadData(JSON.parse(stored), 'localStorage');
      }
    } catch (e) { /* ignore */ }
  }
}

// Filter input listener
document.getElementById('filterSymbol').addEventListener('input', applyFilters);

document.addEventListener('DOMContentLoaded', loadFromAPI);
</script>
</body>
</html>
